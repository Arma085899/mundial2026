<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detalle de Partido - FIFA World Cup 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="./assets/css/theme.css" rel="stylesheet"/>
<script src="./assets/js/data.js"></script>
<script>tailwind.config = window.WC26_TAILWIND_CONFIG;</script>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">

<header id="wc26-topnav"></header>

<main class="flex-grow w-full max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-xl space-y-xl">
    <div id="match-content">
        <div class="skeleton h-64 rounded-xl mb-lg"></div>
        <div class="skeleton h-48 rounded-xl"></div>
    </div>
</main>

<footer id="wc26-footer"></footer>

<script src="./assets/js/nav.js" data-active="calendario"></script>
<script>
(async function () {
    const params = new URLSearchParams(location.search);
    const matchId = parseInt(params.get("id"), 10);
    const container = document.getElementById("match-content");

    if (!matchId) {
        container.innerHTML = `<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Partido no especificado. <a class="text-primary hover:underline" href="index.html">Volver al inicio</a>
        </div>`;
        return;
    }

    const data = await WC26.getMatches();
    const match = data && (data.matches || []).find(m => m.id === matchId);

    if (!match) {
        container.innerHTML = `<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Partido no encontrado. <a class="text-primary hover:underline" href="index.html">Volver al inicio</a>
        </div>`;
        return;
    }

    const info = WC26.statusInfo(match);
    const live = WC26.isLive(match);
    const home = match.home_team;
    const away = match.away_team;
    const homeScorers = (match.scorers || []).filter(s => s.team === "home");
    const awayScorers = (match.scorers || []).filter(s => s.team === "away");

    const groupLabel = (match.group || "").replace("Group ", "Grupo ");
    const stageLabel = match.stage === "GROUP_STAGE"
        ? `${groupLabel}${match.matchday ? ` • Jornada ${match.matchday}` : ""}`
        : (match.stage || "").replace(/_/g, " ");

    const statusBadge = live
        ? `<div class="absolute top-md left-1/2 transform -translate-x-1/2 bg-secondary text-on-secondary font-label-lg text-label-lg px-md py-xs rounded-full flex items-center gap-xs">
                <span class="w-2 h-2 rounded-full bg-on-secondary animate-pulse"></span>
                <span>${info.label}</span>
           </div>`
        : `<div class="absolute top-md left-1/2 transform -translate-x-1/2 ${info.badge} font-label-lg text-label-lg px-md py-xs rounded-full">
                <span>${info.label}</span>
           </div>`;

    const venueLabel = [match.venue, match.city].filter(Boolean).join(", ");

    const scorersBlock = (homeScorers.length || awayScorers.length) ? `
        <div class="bg-surface-container-low border-t border-outline-variant p-md flex justify-between font-body-md text-body-md text-on-surface-variant">
            <div class="w-1/2 flex flex-col items-start gap-xs border-r border-outline-variant pr-md">
                ${homeScorers.map(s => `<div class="flex items-center gap-sm"><span>${s.player} ${s.minute != null ? s.minute + "'" : ""}</span><span class="material-symbols-outlined text-primary text-[14px]">sports_soccer</span></div>`).join("")}
            </div>
            <div class="w-1/2 flex flex-col items-end gap-xs pl-md">
                ${awayScorers.map(s => `<div class="flex items-center gap-sm"><span class="material-symbols-outlined text-primary text-[14px]">sports_soccer</span><span>${s.player} ${s.minute != null ? s.minute + "'" : ""}</span></div>`).join("")}
            </div>
        </div>` : "";

    const broadcastSection = (match.broadcast_mx && match.broadcast_mx.length) ? `
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex items-center gap-md">
            <div class="bg-surface-variant p-sm rounded-lg">
                <span class="material-symbols-outlined text-primary text-[32px]">tv</span>
            </div>
            <div>
                <h4 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Transmisión (MX)</h4>
                <div class="flex gap-xs flex-wrap mt-xs">${WC26.broadcastChips(match.broadcast_mx)}</div>
            </div>
        </section>` : "";

    const stadiumSection = venueLabel ? `
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex items-center gap-md relative overflow-hidden group">
            <div class="bg-surface-variant p-sm rounded-lg">
                <span class="material-symbols-outlined text-primary text-[32px]">stadium</span>
            </div>
            <div class="relative z-10">
                <h4 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Sede</h4>
                <div class="font-headline-md text-headline-md text-on-surface">${match.venue || venueLabel}</div>
                ${match.city ? `<p class="font-body-md text-body-md text-on-surface-variant">${match.city}</p>` : ""}
            </div>
        </section>` : "";

    container.innerHTML = `
    <!-- Scoreboard Hero -->
    <section class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_10px_20px_rgba(0,0,0,0.04)] overflow-hidden">
        <div class="flex flex-col md:flex-row items-center justify-between p-lg md:p-xl relative">
            ${statusBadge}
            <p class="absolute top-md right-md font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest hidden md:block">${stageLabel}</p>

            <!-- Team 1 -->
            <div class="flex flex-col items-center gap-sm w-full md:w-1/3 mt-lg md:mt-0">
                ${WC26.crestImg(home, "w-24 h-24 md:w-32 md:h-32")}
                <h2 class="font-display-md text-display-md text-on-surface text-center">${WC26.teamLabel(home).toUpperCase()}</h2>
                <span class="font-label-lg text-label-lg text-on-surface-variant bg-surface-variant px-sm py-xs rounded">${WC26.teamShort(home)}</span>
            </div>

            <!-- Score -->
            <div class="flex flex-col items-center justify-center w-full md:w-1/3 py-lg">
                <div class="flex items-baseline gap-md">
                    <span class="font-display-lg text-display-lg ${live ? 'text-secondary' : 'text-primary'}">${match.score.home ?? "-"}</span>
                    <span class="font-headline-lg text-headline-lg text-on-surface-variant">-</span>
                    <span class="font-display-lg text-display-lg text-primary">${match.score.away ?? "-"}</span>
                </div>
                <p class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest mt-sm md:hidden">${stageLabel}</p>
            </div>

            <!-- Team 2 -->
            <div class="flex flex-col items-center gap-sm w-full md:w-1/3">
                ${WC26.crestImg(away, "w-24 h-24 md:w-32 md:h-32")}
                <h2 class="font-display-md text-display-md text-on-surface text-center">${WC26.teamLabel(away).toUpperCase()}</h2>
                <span class="font-label-lg text-label-lg text-on-surface-variant bg-surface-variant px-sm py-xs rounded">${WC26.teamShort(away)}</span>
            </div>
        </div>
        ${scorersBlock}
    </section>

    <!-- Context Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-lg mt-xl">
        ${broadcastSection}
        ${stadiumSection}
        ${!broadcastSection && !stadiumSection ? `
        <section class="md:col-span-2 bg-surface-container-low border border-outline-variant rounded-xl p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Más información estará disponible cuando comience el partido.
        </section>` : ""}
    </div>
    `;
})();
</script>
</body>
</html>
