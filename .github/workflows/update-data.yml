name: Actualizar datos del Mundial

on:
  # Corre cada 10 minutos
  schedule:
    - cron: "*/10 * * * *"
  # Permite correrlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar script de actualizacion
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-data.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "Actualizar datos del Mundial [auto]"
            git push
          fi
