<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FIFA World Cup 2026 - Inicio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="./assets/css/theme.css" rel="stylesheet"/>
<script src="./assets/js/data.js"></script>
<script>tailwind.config = window.WC26_TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">

<header id="wc26-topnav"></header>

<main class="flex-grow w-full max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-lg flex flex-col gap-xl">

    <!-- Hero Section: Partido Estelar -->
    <section class="relative w-full rounded-xl overflow-hidden shadow-lg border border-outline-variant group min-h-[320px] md:min-h-[400px]">
        <div class="absolute inset-0 bg-black/20 z-10 pointer-events-none transition-opacity group-hover:opacity-10"></div>
        <img alt="Estadio" class="w-full h-[320px] md:h-[400px] object-cover" id="hero-stadium-img" src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1600&auto=format&fit=crop"/>
        <div class="absolute bottom-0 left-0 w-full p-md md:p-lg z-20 flex flex-col md:flex-row justify-between items-end gap-md bg-gradient-to-t from-surface/95 to-transparent">
            <div id="hero-content" class="glass-panel p-md rounded-lg max-w-xl">
                <div class="skeleton h-6 w-40 rounded mb-sm"></div>
                <div class="skeleton h-10 w-64 rounded mb-sm"></div>
                <div class="skeleton h-4 w-80 rounded"></div>
            </div>
        </div>
    </section>

    <!-- Live Matches Strip -->
    <section class="flex flex-col gap-md">
        <div class="flex justify-between items-center">
            <h3 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-wide">En Juego</h3>
            <a class="font-label-lg text-label-lg text-primary hover:underline" href="calendario.html">Ver todos</a>
        </div>
        <div id="live-matches" class="flex gap-md overflow-x-auto pb-sm snap-x hide-scrollbar">
            <div class="skeleton h-32 w-72 rounded-lg flex-shrink-0"></div>
            <div class="skeleton h-32 w-72 rounded-lg flex-shrink-0"></div>
        </div>
    </section>

    <!-- Two Column Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-xl">
        <!-- Left: Quiniela Eliminados -->
        <div class="lg:col-span-7 flex flex-col gap-md">
            <div class="flex justify-between items-center">
                <h3 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-wide">Eliminados de la Quiniela</h3>
                <a class="font-label-lg text-label-lg text-primary hover:underline" href="quiniela.html">Ver Quiniela Completa</a>
            </div>
            <div id="quiniela-eliminados" class="bg-surface border border-outline-variant rounded-lg overflow-hidden">
                <div class="p-md skeleton h-32 w-full rounded-lg"></div>
            </div>
        </div>

        <!-- Right: Noticias de la Sede -->
        <div class="lg:col-span-5 flex flex-col gap-md">
            <div class="flex justify-between items-center">
                <h3 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-wide">Noticias de la Sede</h3>
                <span class="material-symbols-outlined text-primary">location_city</span>
            </div>
            <div class="flex flex-col gap-md" id="host-news">
                <div class="skeleton h-32 rounded-lg"></div>
                <div class="skeleton h-32 rounded-lg"></div>
            </div>
        </div>
    </div>

</main>

<footer id="wc26-footer"></footer>

<script src="./assets/js/nav.js" data-active="inicio"></script>
<script>
(async function () {
    const [matchesData, quinielaData] = await Promise.all([
        WC26.getMatches(),
        WC26.getQuiniela()
    ]);

    /* ---------- Hero: Partido Estelar ---------- */
    const heroContent = document.getElementById("hero-content");
    if (matchesData && matchesData.matches && matchesData.matches.length) {
        const allMatches = matchesData.matches;

        // Prefer live match; else next scheduled match
        let featured = allMatches.find(m => WC26.isLive(m));
        if (!featured) {
            const upcoming = allMatches
                .filter(m => m.status === "SCHEDULED" || m.status === "TIMED")
                .sort((a, b) => new Date(a.utc_date) - new Date(b.utc_date));
            featured = upcoming[0];
        }
        if (!featured) featured = allMatches[0];

        if (featured) {
            const home = featured.home_team;
            const away = featured.away_team;
            const isLive = WC26.isLive(featured);
            const groupLabel = (featured.group || "").replace("Group ", "Grupo ");
            const venueLabel = [featured.venue, featured.city].filter(Boolean).join(", ");
            const badgeLabel = isLive ? "En Vivo" : "Partido del Día";
            const badgeDot = `<span class="w-2 h-2 rounded-full bg-secondary mr-1 ${isLive ? 'animate-pulse' : ''}"></span>`;

            heroContent.innerHTML = `
                <div class="flex items-center gap-sm mb-sm">
                    <span class="inline-flex items-center px-2 py-1 rounded bg-secondary-container text-on-secondary-container font-label-md text-label-md uppercase">
                        ${badgeDot}${badgeLabel}
                    </span>
                    <span class="font-label-lg text-label-lg text-on-surface">${groupLabel || ""}${groupLabel && venueLabel ? " • " : ""}${venueLabel}</span>
                </div>
                <div class="flex items-baseline gap-sm mb-sm">
                    <h2 class="font-display-md text-display-md text-on-surface">${WC26.teamShort(home)}</h2>
                    <span class="font-headline-md text-headline-md text-tertiary-container px-sm">${isLive ? WC26.formatScore(featured) : "VS"}</span>
                    <h2 class="font-display-md text-display-md text-on-surface">${WC26.teamShort(away)}</h2>
                </div>
                <p class="font-body-lg text-body-lg text-on-surface-variant mb-md">
                    ${WC26.teamLabel(home)} vs ${WC26.teamLabel(away)}${groupLabel ? ` — ${groupLabel}` : ""}.
                </p>
                <div class="flex gap-sm">
                    <a href="partido.html?id=${featured.id}" class="bg-primary-container text-on-primary px-lg py-sm font-headline-md text-headline-md rounded-DEFAULT hover:opacity-90 transition-opacity inline-block">
                        ${isLive ? "Ver en Vivo" : "Ver Previa"}
                    </a>
                    <a href="partido.html?id=${featured.id}" class="bg-surface text-primary border border-primary px-lg py-sm font-headline-md text-headline-md rounded-DEFAULT hover:bg-surface-container-low transition-colors inline-block">
                        Detalles
                    </a>
                </div>`;
        } else {
            heroContent.innerHTML = `<p class="font-body-lg text-body-lg text-on-surface-variant">No hay partidos disponibles aún.</p>`;
        }
    } else {
        heroContent.innerHTML = `<p class="font-body-lg text-body-lg text-on-surface-variant">No se pudieron cargar los partidos.</p>`;
    }

    /* ---------- Live Matches Strip ---------- */
    const liveEl = document.getElementById("live-matches");
    if (matchesData && matchesData.matches) {
        const allMatches = matchesData.matches;
        const todayKey = new Date().toLocaleDateString("en-CA", { timeZone: "America/Mexico_City" });
        const grouped = WC26.groupByDate(allMatches);

        let relevant = allMatches.filter(m => WC26.isLive(m));
        if (relevant.length === 0) {
            relevant = (grouped[todayKey] || [])
                .filter(m => m.status === "SCHEDULED" || m.status === "TIMED" || m.status === "FINISHED")
                .sort((a, b) => new Date(a.utc_date) - new Date(b.utc_date))
                .slice(0, 6);
        }

        if (relevant.length === 0) {
            liveEl.innerHTML = `<div class="bg-surface border border-outline-variant rounded-lg p-md text-on-surface-variant font-body-md text-body-md flex-shrink-0 w-full">
                No hay partidos en vivo en este momento.
            </div>`;
        } else {
            liveEl.innerHTML = relevant.map(renderLiveCard).join("");
        }
    } else {
        liveEl.innerHTML = "";
    }

    function renderLiveCard(match) {
        const info = WC26.statusInfo(match);
        const live = WC26.isLive(match);
        const groupLabel = (match.group || "").replace("Group ", "Grupo ");
        const stripeColor = live ? "bg-secondary-container" : (match.status === "FINISHED" ? "bg-outline-variant" : "bg-primary-container");
        const statusLabel = live
            ? `<span class="font-label-md text-label-md text-secondary uppercase flex items-center gap-1">
                 <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span> ${info.label}
               </span>`
            : `<span class="font-label-md text-label-md text-on-surface-variant uppercase">${info.label}</span>`;

        return `
        <a href="partido.html?id=${match.id}" class="min-w-[280px] bg-surface border border-outline-variant rounded-lg p-md snap-start relative overflow-hidden flex-shrink-0 ${live ? 'shadow-[0_10px_20px_rgba(0,0,0,0.04)]' : 'opacity-90 hover:opacity-100 transition-opacity'}">
            <div class="absolute top-0 left-0 w-full h-1 ${stripeColor}"></div>
            <div class="flex justify-between items-center mb-sm">
                ${statusLabel}
                <span class="font-label-md text-label-md text-on-surface-variant">${groupLabel}</span>
            </div>
            <div class="flex justify-between items-center font-title-lg text-title-lg text-on-surface mb-xs">
                <span>${WC26.teamShort(match.home_team)}</span>
                <span class="font-headline-md text-headline-md bg-surface-container-high px-2 py-1 rounded">${WC26.formatScore(match)}</span>
                <span>${WC26.teamShort(match.away_team)}</span>
            </div>
            ${match.broadcast_mx && match.broadcast_mx.length ? `<div class="mt-sm flex gap-xs flex-wrap">${WC26.broadcastChips(match.broadcast_mx)}</div>` : ""}
        </a>`;
    }

    /* ---------- Quiniela Eliminados ---------- */
    const eliminadosEl = document.getElementById("quiniela-eliminados");
    if (quinielaData && quinielaData.participants && quinielaData.participants.length) {
        const eliminados = quinielaData.participants.filter(p =>
            p.teams.every(t => t.status === "eliminated")
        );

        if (eliminados.length === 0) {
            eliminadosEl.innerHTML = `<div class="p-lg text-center text-on-surface-variant font-body-md text-body-md">
                Aún nadie ha sido eliminado de la quiniela. ¡Suerte para todos!
            </div>`;
        } else {
            eliminadosEl.innerHTML = `
            <div class="grid grid-cols-4 gap-sm p-sm bg-surface-container-low border-b border-outline-variant font-label-lg text-label-lg text-on-surface-variant">
                <div class="col-span-2">Participante</div>
                <div class="text-center">Equipos</div>
                <div class="text-right pr-sm">Estado</div>
            </div>
            <div class="divide-y divide-outline-variant">
                ${eliminados.map(p => `
                <div class="grid grid-cols-4 gap-sm p-sm items-center bg-error-container/10">
                    <div class="col-span-2 font-title-lg text-title-lg text-on-surface opacity-80">${p.name}</div>
                    <div class="text-center font-body-md text-body-md text-on-surface-variant">${p.teams.map(t => t.tla).join(", ")}</div>
                    <div class="text-right">
                        <span class="inline-block px-2 py-1 rounded bg-tertiary-container text-on-tertiary-container font-label-md text-label-md">Eliminado</span>
                    </div>
                </div>`).join("")}
            </div>`;
        }
    } else {
        eliminadosEl.innerHTML = `<div class="p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Quiniela no disponible aún.
        </div>`;
    }

    /* ---------- Host City News (editorial placeholder) ---------- */
    const newsEl = document.getElementById("host-news");
    const placeholderNews = [
        {
            city: "Ciudad de México",
            headline: "Zócalo listo para el Fan Fest más grande de la historia.",
            tag: "Alerta de Tráfico",
            tagColor: "bg-tertiary-container",
            img: "https://images.unsplash.com/photo-1518105779142-d975f22f1b0a?q=80&w=800&auto=format&fit=crop"
        },
        {
            city: "Monterrey",
            headline: "Transporte gratuito hacia el Estadio BBVA los días de partido.",
            tag: "Condiciones Óptimas",
            tagColor: "bg-secondary-container",
            img: "https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=800&auto=format&fit=crop"
        }
    ];

    newsEl.innerHTML = placeholderNews.map(n => `
        <div class="bg-surface rounded-lg border border-outline-variant overflow-hidden group cursor-pointer">
            <div class="h-32 bg-surface-container-high relative overflow-hidden">
                <img alt="${n.city}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${n.img}"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <h4 class="absolute bottom-sm left-sm font-headline-md text-headline-md text-white">${n.city}</h4>
            </div>
            <div class="p-sm">
                <p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">${n.headline}</p>
                <div class="mt-sm flex items-center gap-xs">
                    <span class="w-2 h-2 rounded-full ${n.tagColor}"></span>
                    <span class="font-label-md text-label-md text-on-surface uppercase">${n.tag}</span>
                </div>
            </div>
        </div>`).join("");
})();
</script>
</body>
</html>
