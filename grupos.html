<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FIFA World Cup 2026 - Grupos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="./assets/css/theme.css" rel="stylesheet"/>
<script src="./assets/js/data.js"></script>
<script>tailwind.config = window.WC26_TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-background min-h-screen stadium-bg flex flex-col">

<header id="wc26-topnav"></header>

<main class="flex-grow max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-xl w-full">
    <header class="mb-xl text-center">
        <h1 class="font-display-lg text-display-lg text-primary mb-sm">Clasificación de Grupos</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">Sigue de cerca la batalla por avanzar a la siguiente ronda. Los dos primeros de cada grupo aseguran su lugar en la siguiente fase.</p>
    </header>

    <div id="groups-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-lg xl:gap-xl">
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
        <div class="skeleton h-64 rounded-xl"></div>
    </div>
</main>

<footer id="wc26-footer"></footer>

<script src="./assets/js/nav.js" data-active="grupos"></script>
<script>
(async function () {
    const data = await WC26.getStandings();
    const gridEl = document.getElementById("groups-grid");

    if (!data || !data.groups || !data.groups.length) {
        gridEl.innerHTML = `<div class="lg:col-span-2 bg-surface border border-outline-variant rounded-xl p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Tablas de grupos no disponibles aún.
        </div>`;
        return;
    }

    const groups = [...data.groups].sort((a, b) => a.group.localeCompare(b.group));
    gridEl.innerHTML = groups.map(renderGroup).join("");

    function renderGroup(group) {
        const groupLabel = WC26.groupLabel(group.group);

        const rows = group.standings.map(s => {
            const rowCls = s.qualified ? "border-b border-outline-variant/50 bg-secondary-container/10" : "border-b border-outline-variant/50";
            const posCls = s.qualified ? "font-bold text-secondary" : "text-on-surface-variant";
            const nameCls = s.qualified ? "font-bold" : "";
            const cellCls = s.qualified ? "" : "text-on-surface-variant";
            const ptsCls = s.qualified ? "font-bold" : "";

            return `
            <tr class="${rowCls}">
                <td class="py-md px-md text-center ${posCls}">${s.position}</td>
                <td class="py-md px-md ${nameCls} flex items-center gap-sm">
                    ${WC26.crestImg(s.team, "w-6 h-6")}
                    <span>${s.team.name}</span>
                </td>
                <td class="py-md px-sm text-center ${cellCls}">${s.played}</td>
                <td class="py-md px-sm text-center ${cellCls}">${s.goal_difference > 0 ? '+' : ''}${s.goal_difference}</td>
                <td class="py-md px-md text-center ${ptsCls}">${s.points}</td>
            </tr>`;
        }).join("");

        return `
        <div class="group-card bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-300">
            <div class="bg-surface-container-low px-md py-sm border-b border-outline-variant flex justify-between items-center">
                <h2 class="font-title-lg text-title-lg text-primary">${groupLabel}</h2>
            </div>
            <table class="w-full text-left">
                <thead>
                    <tr class="font-label-lg text-label-lg text-on-surface-variant border-b border-outline-variant bg-surface-container-low/50">
                        <th class="py-sm px-md w-12 text-center">Pos</th>
                        <th class="py-sm px-md">Equipo</th>
                        <th class="py-sm px-sm text-center">PJ</th>
                        <th class="py-sm px-sm text-center">DG</th>
                        <th class="py-sm px-md text-center">PTS</th>
                    </tr>
                </thead>
                <tbody class="font-body-md text-body-md">
                    ${rows}
                </tbody>
            </table>
        </div>`;
    }
})();
</script>
</body>
</html>
