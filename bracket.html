<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cuadro - FIFA World Cup 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="./assets/css/theme.css" rel="stylesheet"/>
<script src="./assets/js/data.js"></script>
<script>tailwind.config = window.WC26_TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">

<header id="wc26-topnav"></header>

<main class="flex-grow w-full px-margin-mobile md:px-margin-desktop max-w-[1440px] mx-auto py-xl">
    <div class="mb-xl text-center md:text-left">
        <h1 class="font-display-lg text-display-lg text-primary mb-sm">Fase Eliminatoria</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">El camino hacia la gloria. Sigue el progreso de las selecciones desde la Ronda de 32 hasta la final.</p>
    </div>

    <!-- Stage filter chips -->
    <div id="stage-filters" class="flex flex-wrap gap-sm mb-lg">
        <div class="skeleton h-9 w-24 rounded-full"></div>
        <div class="skeleton h-9 w-24 rounded-full"></div>
        <div class="skeleton h-9 w-24 rounded-full"></div>
    </div>

    <div id="bracket-container" class="bracket-scroll overflow-x-auto pb-lg relative w-full border border-outline-variant rounded-lg bg-surface-bright">
        <div class="min-w-[1200px] p-lg flex justify-between gap-xl relative">
            <div class="skeleton h-96 w-64 rounded-lg"></div>
            <div class="skeleton h-96 w-64 rounded-lg"></div>
            <div class="skeleton h-96 w-64 rounded-lg"></div>
        </div>
    </div>
</main>

<footer id="wc26-footer"></footer>

<script src="./assets/js/nav.js" data-active="bracket"></script>
<script>
(async function () {
    const data = await WC26.getBracket();
    const container = document.getElementById("bracket-container");
    const filtersEl = document.getElementById("stage-filters");

    if (!data || !data.stages || !data.stages.length) {
        filtersEl.innerHTML = "";
        container.innerHTML = `<div class="p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Bracket de eliminatorias no disponible aún.
        </div>`;
        return;
    }

    const allStages = data.stages;
    const stagesWithMatches = allStages.filter(s => s.matches && s.matches.length);

    if (!stagesWithMatches.length) {
        filtersEl.innerHTML = "";
        container.innerHTML = `<div class="p-lg text-center text-on-surface-variant font-body-md text-body-md">
            El cuadro se irá llenando conforme avance la fase de grupos.
        </div>`;
        return;
    }

    let activeStage = "ALL";

    renderFilters();
    render();

    function renderFilters() {
        const chips = [{ key: "ALL", label: "Ver Todo" }, ...stagesWithMatches.map(s => ({ key: s.stage, label: s.label }))];
        filtersEl.innerHTML = chips.map(c => {
            const isActive = c.key === activeStage;
            const cls = isActive
                ? "bg-tertiary text-on-tertiary font-label-lg text-label-lg px-md py-sm rounded-full border border-tertiary shadow-sm"
                : "bg-surface text-on-surface font-label-lg text-label-lg px-md py-sm rounded-full border border-outline-variant hover:bg-surface-variant transition-colors";
            return `<button class="${cls}" data-stage="${c.key}">${c.label}</button>`;
        }).join("");

        filtersEl.querySelectorAll("button[data-stage]").forEach(btn => {
            btn.addEventListener("click", () => {
                activeStage = btn.dataset.stage;
                renderFilters();
                render();
            });
        });
    }

    function render() {
        const stagesToShow = activeStage === "ALL"
            ? stagesWithMatches
            : stagesWithMatches.filter(s => s.stage === activeStage);

        container.innerHTML = `
        <div class="min-w-[1200px] p-lg flex justify-between gap-xl relative">
            ${stagesToShow.map((stage, idx) => renderStageColumn(stage, idx, stagesToShow.length)).join("")}
        </div>`;
    }

    function renderStageColumn(stage, idx, total) {
        const paddingTop = total > 1 ? `pt-${Math.min(idx * 16, 48)}` : "";
        return `
        <div class="flex flex-col justify-around gap-lg w-64 relative z-10 ${paddingTop}">
            <h2 class="font-headline-md text-headline-md text-on-surface-variant text-center mb-md border-b border-outline-variant pb-xs">${stage.label}</h2>
            ${stage.matches.map(m => renderMatchCard(m, stage.stage)).join("")}
        </div>`;
    }

    function teamSideLabel(side) {
        if (side.team) return WC26.teamLabel(side.team);
        return side.placeholder || "Por definir";
    }

    function renderMatchCard(match, stage) {
        const isFinal = stage === "FINAL";
        const homeDefined = !!match.home.team;
        const awayDefined = !!match.away.team;
        const homeScore = match.score.home;
        const awayScore = match.score.away;
        const hasScore = homeScore != null && awayScore != null;
        const homeWon = hasScore && homeScore > awayScore;
        const awayWon = hasScore && awayScore > homeScore;

        const live = match.status === "IN_PLAY" || match.status === "PAUSED";
        const liveTag = live
            ? `<div class="bg-tertiary text-on-tertiary px-xs py-[2px] text-center font-label-md text-label-md uppercase tracking-wider">En Vivo</div>`
            : "";

        const venueLabel = [match.venue, match.city].filter(Boolean).join(", ");

        const teamRow = (side, score, won, isLast) => {
            const nameCls = won ? "font-bold" : (side.team ? "" : "text-on-surface-variant");
            const scoreCls = won ? "text-primary" : "text-on-surface-variant";
            const borderCls = isLast ? "" : "border-b border-outline-variant";
            return `
            <div class="flex items-center justify-between p-xs ${borderCls} bg-surface-container-lowest">
                <div class="flex items-center gap-xs">
                    ${side.team ? WC26.crestImg(side.team, "w-5 h-5") : `<div class="w-5 h-4 bg-surface-dim border border-outline-variant"></div>`}
                    <span class="font-label-lg text-label-lg text-on-surface ${nameCls}">${teamSideLabel(side)}</span>
                </div>
                <span class="font-headline-md text-headline-md ${scoreCls}">${score ?? ""}</span>
            </div>`;
        };

        const cardCls = isFinal
            ? "bg-surface border-2 border-primary rounded-lg overflow-hidden relative shadow-lg"
            : "bg-surface border border-outline-variant rounded-DEFAULT overflow-hidden relative";

        const linkAttrs = (match.status !== "SCHEDULED" || homeDefined)
            ? `onclick="location.href='partido.html?id=${match.id}'" style="cursor:pointer"`
            : "";

        if (isFinal) {
            return `
            <div class="${cardCls}" ${linkAttrs}>
                <div class="bg-primary text-on-primary px-xs py-sm text-center font-headline-md text-headline-md tracking-wider">
                    ${venueLabel || "Final"}
                </div>
                ${teamRow(match.home, homeScore, homeWon, false)}
                ${teamRow(match.away, awayScore, awayWon, true)}
            </div>`;
        }

        return `
        <div class="${cardCls}" ${linkAttrs}>
            ${liveTag}
            ${teamRow(match.home, homeScore, homeWon, false)}
            ${teamRow(match.away, awayScore, awayWon, true)}
        </div>`;
    }
})();
</script>
</body>
</html>
