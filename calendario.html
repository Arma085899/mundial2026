<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Calendario - FIFA World Cup 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="./assets/css/theme.css" rel="stylesheet"/>
<script src="./assets/js/data.js"></script>
<script>tailwind.config = window.WC26_TAILWIND_CONFIG;</script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">

<header id="wc26-topnav"></header>

<main class="flex-grow flex flex-col w-full max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-xl gap-xl">

    <section class="flex flex-col gap-md">
        <h1 class="font-display-lg text-display-lg text-on-surface">Calendario de Partidos</h1>
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-md">
            <!-- Date Ribbon -->
            <div id="date-ribbon" class="flex gap-sm overflow-x-auto hide-scrollbar w-full md:w-auto pb-2">
                <div class="skeleton h-[72px] w-[72px] rounded-lg flex-shrink-0"></div>
                <div class="skeleton h-[72px] w-[72px] rounded-lg flex-shrink-0"></div>
                <div class="skeleton h-[72px] w-[72px] rounded-lg flex-shrink-0"></div>
            </div>
            <!-- Group filter -->
            <div class="flex gap-sm w-full md:w-auto">
                <div class="relative w-full md:w-48">
                    <select id="group-filter" class="w-full appearance-none bg-surface border-b border-outline-variant text-on-surface font-body-md text-body-md py-sm pl-sm pr-lg focus:outline-none focus:border-primary focus:ring-0 transition-colors">
                        <option value="">Todos los grupos</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
                </div>
            </div>
        </div>
    </section>

    <section id="schedule-list" class="flex flex-col gap-xl">
        <div class="skeleton h-40 rounded-lg"></div>
        <div class="skeleton h-40 rounded-lg"></div>
    </section>
</main>

<footer id="wc26-footer"></footer>

<script src="./assets/js/nav.js" data-active="calendario"></script>
<script>
(async function () {
    const data = await WC26.getMatches();
    const listEl = document.getElementById("schedule-list");
    const ribbonEl = document.getElementById("date-ribbon");
    const groupFilter = document.getElementById("group-filter");

    if (!data || !data.matches || !data.matches.length) {
        ribbonEl.innerHTML = "";
        listEl.innerHTML = `<div class="bg-surface border border-outline-variant rounded-lg p-lg text-center text-on-surface-variant font-body-md text-body-md">
            Calendario no disponible aún.
        </div>`;
        return;
    }

    const allMatches = data.matches;
    const grouped = WC26.groupByDate(allMatches);
    const allDateKeys = Object.keys(grouped).sort();

    // Group filter options
    const groups = [...new Set(allMatches.map(m => m.group).filter(Boolean))].sort();
    groupFilter.innerHTML += groups.map(g => `<option value="${g}">${g.replace("Group ", "Grupo ")}</option>`).join("");

    // Date ribbon
    const todayKey = new Date().toLocaleDateString("en-CA", { timeZone: "America/Mexico_City" });
    let selectedDate = allDateKeys.includes(todayKey) ? todayKey : allDateKeys[0];

    renderRibbon();
    groupFilter.addEventListener("change", render);
    render();

    function renderRibbon() {
        ribbonEl.innerHTML = allDateKeys.map(dateKey => {
            const d = new Date(dateKey + "T12:00:00");
            const month = d.toLocaleDateString("es-MX", { month: "short", timeZone: "America/Mexico_City" }).replace(".", "");
            const day = d.toLocaleDateString("es-MX", { day: "numeric", timeZone: "America/Mexico_City" });
            const isSelected = dateKey === selectedDate;
            const hasLive = (grouped[dateKey] || []).some(m => WC26.isLive(m));
            const cls = isSelected
                ? "flex flex-col items-center justify-center min-w-[72px] h-[72px] rounded-lg border-2 border-primary bg-primary-container/10 transition-colors flex-shrink-0"
                : "flex flex-col items-center justify-center min-w-[72px] h-[72px] rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-high transition-colors flex-shrink-0";
            const textCls = isSelected ? "text-primary" : "text-on-surface";
            return `
            <button class="${cls}" data-date="${dateKey}">
                <span class="font-label-md text-label-md ${isSelected ? 'text-primary' : 'text-on-surface-variant'} uppercase">${month}</span>
                <span class="font-headline-lg text-headline-lg ${textCls}">${day}</span>
                ${hasLive ? '<div class="w-1.5 h-1.5 rounded-full bg-tertiary-container mt-1"></div>' : ''}
            </button>`;
        }).join("");

        ribbonEl.querySelectorAll("button[data-date]").forEach(btn => {
            btn.addEventListener("click", () => {
                selectedDate = btn.dataset.date;
                renderRibbon();
                render();
            });
        });
    }

    function render() {
        const selectedGroup = groupFilter.value;
        let matches = grouped[selectedDate] || [];

        if (selectedGroup) {
            matches = matches.filter(m => m.group === selectedGroup);
        }

        const heading = WC26.formatDateHeading(selectedDate);

        if (!matches.length) {
            listEl.innerHTML = `
            <div class="flex flex-col gap-md">
                <div class="flex items-center gap-sm">
                    <h2 class="font-headline-md text-headline-md text-on-surface">${heading}</h2>
                    <div class="h-[1px] flex-grow bg-outline-variant"></div>
                </div>
                <div class="bg-surface border border-outline-variant rounded-lg p-lg text-center text-on-surface-variant font-body-md text-body-md">
                    No hay partidos para este filtro en esta fecha.
                </div>
            </div>`;
            return;
        }

        const sorted = [...matches].sort((a, b) => new Date(a.utc_date) - new Date(b.utc_date));

        listEl.innerHTML = `
        <div class="flex flex-col gap-md">
            <div class="flex items-center gap-sm">
                <h2 class="font-headline-md text-headline-md text-on-surface">${heading}</h2>
                <div class="h-[1px] flex-grow bg-outline-variant"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-md">
                ${sorted.map(renderCard).join("")}
            </div>
        </div>`;
    }

    function renderCard(match) {
        const info = WC26.statusInfo(match);
        const live = WC26.isLive(match);
        const home = match.home_team;
        const away = match.away_team;
        const groupLabel = (match.group || "").replace("Group ", "Grupo ") || (match.stage || "").replace(/_/g, " ");
        const venueLabel = [match.venue, match.city].filter(Boolean).join(", ");

        const stripeCls = live ? "bg-tertiary-container" : (match.status === "FINISHED" ? "bg-outline-variant" : "bg-primary-container");
        const opacityCls = (live || match.status === "FINISHED") ? "" : "opacity-90";

        const topRow = live
            ? `<div class="flex items-center gap-xs">
                 <span class="material-symbols-outlined text-[16px] text-tertiary-container">sensors</span>
                 <span class="font-label-lg text-label-lg text-tertiary-container uppercase tracking-wider">${info.label}</span>
               </div>`
            : `<div class="flex items-center gap-xs">
                 <span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">${info.label}</span>
               </div>`;

        const broadcastLabel = (match.broadcast_mx || []).length
            ? match.broadcast_mx.join(", ")
            : "Por confirmar";

        return `
        <a href="partido.html?id=${match.id}" class="bg-surface border border-outline-variant rounded-lg p-3 flex flex-col gap-md ${live ? 'shadow-[0px_10px_20px_rgba(0,0,0,0.04)]' : ''} relative overflow-hidden group hover:border-primary transition-colors cursor-pointer ${opacityCls}">
            <div class="absolute top-0 left-0 w-1 h-full ${stripeCls}"></div>
            <div class="flex justify-between items-center pl-sm">
                ${topRow}
                <span class="font-label-md text-label-md text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-DEFAULT">${groupLabel}</span>
            </div>
            <div class="flex items-center justify-between px-sm py-xs">
                <div class="flex items-center gap-sm flex-1">
                    ${WC26.crestImg(home, "w-10 h-10")}
                    <span class="font-headline-lg text-headline-lg text-on-surface">${WC26.teamShort(home)}</span>
                </div>
                <div class="flex flex-col items-center justify-center px-lg bg-surface-container-lowest rounded-lg py-1 border border-outline-variant">
                    <span class="font-display-md text-display-md text-on-surface leading-none">${WC26.formatScore(match)}</span>
                </div>
                <div class="flex items-center gap-sm flex-1 justify-end">
                    <span class="font-headline-lg text-headline-lg text-on-surface">${WC26.teamShort(away)}</span>
                    ${WC26.crestImg(away, "w-10 h-10")}
                </div>
            </div>
            <div class="flex justify-between items-center pl-sm border-t border-outline-variant pt-2 mt-1">
                <div class="flex items-center gap-sm text-on-surface-variant">
                    <span class="material-symbols-outlined text-[16px]">stadium</span>
                    <span class="font-body-md text-body-md">${venueLabel || "Sede por confirmar"}</span>
                </div>
                <div class="flex items-center gap-xs text-on-surface-variant">
                    <span class="material-symbols-outlined text-[16px]">tv</span>
                    <span class="font-body-md text-body-md">${broadcastLabel}</span>
                </div>
            </div>
        </a>`;
    }
})();
</script>
</body>
</html>
